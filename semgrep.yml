rules:
  # ----------------------------
  # 1. Dangerous eval
  # ----------------------------
  - id: avoid-eval
    pattern: eval($X)
    message: Avoid using eval()
    languages: [python]
    severity: ERROR

  # ----------------------------
  # 2. Dangerous exec
  # ----------------------------
  - id: avoid-exec
    pattern: exec($X)
    message: Avoid using exec()
    languages: [python]
    severity: ERROR

  # ----------------------------
  # 3. REAL secret detection (fixed)
  # ----------------------------
  - id: hardcoded-password
    pattern: |
      password = "..."
    message: Avoid hardcoded passwords
    languages: [python]
    severity: WARNING

  - id: api-key-hardcoded
    pattern-regex: "(api_key|apikey|secret|token)\\s*=\\s*[\"'].*[\"']"
    message: Possible hardcoded API key or secret
    languages: [python]
    severity: WARNING
