image: python:3.12

stages:
  - format
  - lint
  - type_check
  - test
  - coverage
  - security

before_script:
  - python3 --version
  - python3 -m pip install --upgrade "pip>=26.1.2"
  - python3 -m pip --version
  - python3 -m pip install -r requirements.txt
  - python3 -m pip install ruff mypy bandit pylint flake8 pytest pytest-cov pip-audit semgrep

format:
  stage: format
  script:
    - python3 -m ruff format --check .

lint:
  stage: lint
  script:
    - python3 -m ruff check .
    - python3 -m flake8 .
    - python3 -m pylint --disable=C0103,W0613,R0913,R0917,W0718,R0801 app.py pages utils

type_check:
  stage: type_check
  script:
    - python3 -m mypy .

test:
  stage: test
  coverage: '/TOTAL.*\s+(\d+(?:\.\d+)?)%/'
  script:
    - python3 -m pytest --cov=. --cov-report=term --cov-report=xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml

coverage:
  stage: coverage
  coverage: '/TOTAL.*\s+(\d+(?:\.\d+)?)%/'
  script:
    - python3 -m pytest --cov=. --cov-report=term --cov-report=xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml

biome:
  image: node:22
  stage: lint
  before_script:
    - node --version
    - npm ci
  script:
    - npm run tool:biome

dependency_audit:
  stage: security
  script:
    - python3 -m pip_audit 
      
semgrep:
  stage: security
  variables:
    SEMGREP_SEND_METRICS: "off"
  script:
    - semgrep scan --config .semgrep.yml .

gitleaks:
  stage: security
  script:
    - echo "Skipping gitleaks on shell runner"
