image: python:3.12

stages:

* format
* lint
* type_check
* test
* coverage
* security

before_script:

* export PATH="/Library/Frameworks/Python.framework/Versions/3.14/bin:$PATH"
* python3 --version
* python3 -m pip install -r requirements.txt
* python3 -m pip install ruff mypy bandit pylint flake8 pytest pytest-cov pip-audit

format:
stage: format
script:
- python3 -m ruff format --check .

lint:
stage: lint
script:
- python3 -m ruff check .
- python3 -m flake8 .
- python3 -m pylint app.py pages utils

type_check:
stage: type_check
script:
- python3 -m mypy .

test:
stage: test
script:
- python3 -m pytest

coverage:
stage: coverage
script:
- python3 -m pytest --cov=. --cov-report=term --cov-report=xml

dependency_audit:
stage: security
script:
- python3 -m pip_audit

gitleaks:
stage: security
script:
- echo "Skipping gitleaks on shell runner"
