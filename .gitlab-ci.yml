image: python:3.12

stages:
  - quality
  - security

before_script:
  - python --version
  - pip install -r requirements.txt
  - pip install ruff mypy bandit pylint flake8 pip-audit

quality:
  stage: quality
  script:
    - ruff check .
    - mypy .
    - bandit -r .
    - pylint app.py pages utils
    - flake8 .

dependency_audit:
  stage: security
  script:
    - pip-audit

gitleaks:
  stage: security
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect --source . --verbose
