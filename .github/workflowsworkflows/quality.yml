name: Quality Checks

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: ruff check .
      - run: mypy .
      - run: bandit -r .
      - run: pylint app.py pages utils
